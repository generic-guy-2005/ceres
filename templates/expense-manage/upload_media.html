<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manage</title>
    <link rel="stylesheet" href="/static/css/em_add_cash.css">
</head>
<body>
    <div class="main-board">
        <div>
            <form action="/save-media" method="POST" enctype="multipart/form-data">
                <div class="section" style="margin-bottom: 10px;">
                    <label for="media">Media</label> <br>
                    <input type="file" name="media" id="media" min="0" class="cash-field" style="padding: 2px;">
                </div>
                <div class="section" style="margin-bottom: 10px;">
                    <label for="type">Type</label> <br>
                    <select name="type" id="type" style="border-radius: 10px; width: 50%; padding: 2px">
                        <option value="Pixiv">Pixiv</option>
                        <option value="Pinterest - Anime">Pinterest - Anime</option>
                        <option value="Pinterest - Cosplay">Pinterest - Cosplay</option>
                        <option value="Pinterest - Picture">Pinterest - Picture</option>
                    </select>
                </div>
                <div class="section">
                    <label for="filetype">File Type</label> <br>
                    <select name="filetype" id="filetype" style="padding: 2px; width: 50%; border-radius: 10px;">
                        <option value="img">Image</option>
                        <option value="vid">Video</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px; margin-top: 10px;">
                    <a class="btn" style="background-color: #B2DA5D; text-decoration: none; font-size: 14px;"
                        href="/em-dashboard">Cancel</a>
                    <input type="submit" name="update_digital" id="update_digital" value="Done" class="btn"
                        style="background-color: #226be2; border: none;">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
